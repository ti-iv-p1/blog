<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tableGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGradient)"/>
  
  <!-- Decorative patterns -->
  <circle cx="50" cy="50" r="30" fill="#2563eb" opacity="0.2"/>
  <circle cx="750" cy="350" r="40" fill="#2563eb" opacity="0.2"/>
  <circle cx="700" cy="80" r="20" fill="#60a5fa" opacity="0.3"/>
  
  <!-- Database cylinder icon -->
  <g transform="translate(80, 80)">
    <!-- Bottom ellipse -->
    <ellipse cx="50" cy="80" rx="45" ry="15" fill="#60a5fa" opacity="0.8"/>
    <!-- Cylinder body -->
    <rect x="5" y="30" width="90" height="50" fill="#3b82f6" opacity="0.8"/>
    <!-- Side lines -->
    <line x1="5" y1="30" x2="5" y2="80" stroke="#1e40af" stroke-width="2"/>
    <line x1="95" y1="30" x2="95" y2="80" stroke="#1e40af" stroke-width="2"/>
    <!-- Top ellipse -->
    <ellipse cx="50" cy="30" rx="45" ry="15" fill="#60a5fa" opacity="0.9"/>
    <!-- Highlight -->
    <ellipse cx="50" cy="30" rx="35" ry="10" fill="#93c5fd" opacity="0.5"/>
  </g>
  
  <!-- Table representation 1 -->
  <g transform="translate(240, 85)">
    <rect width="140" height="35" fill="#1e40af" rx="4"/>
    <text x="70" y="22" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Tabel Siswa</text>
    
    <rect y="35" width="140" height="25" fill="#3b82f6" opacity="0.9"/>
    <text x="10" y="52" fill="white" font-family="Arial, sans-serif" font-size="11">id | nama | alamat</text>
    
    <rect y="60" width="140" height="20" fill="#60a5fa" opacity="0.7"/>
    <text x="10" y="74" fill="white" font-family="Arial, sans-serif" font-size="10">1 | Budi | Jakarta</text>
  </g>
  
  <!-- Table representation 2 -->
  <g transform="translate(420, 85)">
    <rect width="140" height="35" fill="#1e40af" rx="4"/>
    <text x="70" y="22" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Tabel Nilai</text>
    
    <rect y="35" width="140" height="25" fill="#3b82f6" opacity="0.9"/>
    <text x="10" y="52" fill="white" font-family="Arial, sans-serif" font-size="11">id_siswa | nilai</text>
    
    <rect y="60" width="140" height="20" fill="#60a5fa" opacity="0.7"/>
    <text x="10" y="74" fill="white" font-family="Arial, sans-serif" font-size="10">1 | A</text>
  </g>
  
  <!-- Relation arrow -->
  <g>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" />
      </marker>
    </defs>
    <line x1="380" y1="117" x2="420" y2="117" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="400" y="110" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="10" font-weight="bold">1:N</text>
  </g>
  
  <!-- Normalization levels -->
  <g transform="translate(80, 200)">
    <!-- 1NF -->
    <rect width="100" height="50" fill="#10b981" opacity="0.8" rx="8"/>
    <text x="50" y="22" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">1NF</text>
    <text x="50" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Atomic</text>
    
    <!-- Arrow -->
    <path d="M 105 25 L 135 25" stroke="#fbbf24" stroke-width="2" fill="none"/>
    <polygon points="135,20 145,25 135,30" fill="#fbbf24"/>
    
    <!-- 2NF -->
    <rect x="150" width="100" height="50" fill="#3b82f6" opacity="0.8" rx="8"/>
    <text x="200" y="22" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">2NF</text>
    <text x="200" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">No Partial</text>
    
    <!-- Arrow -->
    <path d="M 255 25 L 285 25" stroke="#fbbf24" stroke-width="2" fill="none"/>
    <polygon points="285,20 295,25 285,30" fill="#fbbf24"/>
    
    <!-- 3NF -->
    <rect x="300" width="100" height="50" fill="#8b5cf6" opacity="0.8" rx="8"/>
    <text x="350" y="22" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">3NF</text>
    <text x="350" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">No Transitive</text>
  </g>
  
  <!-- Main Title -->
  <text x="400" y="310" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32" font-weight="bold">Database Normalisasi</text>
  
  <!-- Subtitle -->
  <text x="400" y="340" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="18">Desain Database yang Efisien dan Terstruktur</text>
  
  <!-- Key icon -->
  <g transform="translate(580, 200)">
    <circle cx="30" cy="25" r="20" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="30" cy="25" r="8" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <rect x="30" y="20" width="25" height="8" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <rect x="40" y="25" width="3" height="5" fill="#fbbf24"/>
    <rect x="48" y="25" width="3" height="5" fill="#fbbf24"/>
    <text x="30" y="60" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Primary Key</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="630" cy="240" r="5" fill="#f59e0b" opacity="0.6"/>
  <circle cx="650" cy="230" r="3" fill="#ef4444" opacity="0.6"/>
  <circle cx="670" cy="245" r="4" fill="#fbbf24" opacity="0.6"/>
  
  <!-- Bottom decorative line -->
  <line x1="50" y1="370" x2="750" y2="370" stroke="url(#accentGradient)" stroke-width="3" opacity="0.6"/>
</svg>