<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial" font-size="22" fill="#24292e" text-anchor="middle" font-weight="bold">GitHub Pages Deployment Process</text>
  
  <!-- Step 1: Repository -->
  <rect x="50" y="80" width="180" height="80" fill="#f6f8fa" stroke="#0969da" stroke-width="2" rx="5"/>
  <text x="140" y="110" font-family="Arial" font-size="14" fill="#24292e" text-anchor="middle" font-weight="bold">1. GitHub Repository</text>
  <text x="140" y="135" font-family="Arial" font-size="11" fill="#586069" text-anchor="middle">Your code and files</text>
  
  <!-- Step 2: Settings -->
  <rect x="310" y="80" width="180" height="80" fill="#f6f8fa" stroke="#0969da" stroke-width="2" rx="5"/>
  <text x="400" y="110" font-family="Arial" font-size="14" fill="#24292e" text-anchor="middle" font-weight="bold">2. Enable Pages</text>
  <text x="400" y="135" font-family="Arial" font-size="11" fill="#586069" text-anchor="middle">Settings → Pages</text>
  
  <!-- Step 3: Build -->
  <rect x="570" y="80" width="180" height="80" fill="#f6f8fa" stroke="#0969da" stroke-width="2" rx="5"/>
  <text x="660" y="110" font-family="Arial" font-size="14" fill="#24292e" text-anchor="middle" font-weight="bold">3. GitHub Builds</text>
  <text x="660" y="135" font-family="Arial" font-size="11" fill="#586069" text-anchor="middle">Automatic deployment</text>
  
  <!-- Step 4: Live Site -->
  <rect x="310" y="250" width="180" height="100" fill="#dafbe1" stroke="#1a7f37" stroke-width="3" rx="5"/>
  <text x="400" y="285" font-family="Arial" font-size="16" fill="#1a7f37" text-anchor="middle" font-weight="bold">✓ Live Website</text>
  <text x="400" y="310" font-family="Arial" font-size="12" fill="#1a7f37" text-anchor="middle">username.github.io</text>
  <text x="400" y="330" font-family="Arial" font-size="10" fill="#1a7f37" text-anchor="middle">/repository-name</text>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0969da" />
    </marker>
  </defs>
  
  <line x1="230" y1="120" x2="305" y2="120" stroke="#0969da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="120" x2="565" y2="120" stroke="#0969da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="160" x2="450" y2="250" stroke="#0969da" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Labels on arrows -->
  <text x="268" y="110" font-family="Arial" font-size="10" fill="#0969da" text-anchor="middle">Configure</text>
  <text x="528" y="110" font-family="Arial" font-size="10" fill="#0969da" text-anchor="middle">Deploy</text>
  <text x="580" y="200" font-family="Arial" font-size="10" fill="#0969da" text-anchor="middle">Publish</text>
</svg>