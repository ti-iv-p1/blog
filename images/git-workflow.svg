<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="24" fill="#24292e" text-anchor="middle" font-weight="bold">Git Workflow</text>
  
  <!-- Working Directory -->
  <rect x="50" y="80" width="150" height="100" fill="#ffd700" stroke="#333" stroke-width="2" rx="5"/>
  <text x="125" y="110" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Working</text>
  <text x="125" y="130" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Directory</text>
  <text x="125" y="155" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">(Modified Files)</text>
  
  <!-- Staging Area -->
  <rect x="325" y="80" width="150" height="100" fill="#90ee90" stroke="#333" stroke-width="2" rx="5"/>
  <text x="400" y="110" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Staging</text>
  <text x="400" y="130" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Area</text>
  <text x="400" y="155" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">(git add)</text>
  
  <!-- Repository -->
  <rect x="600" y="80" width="150" height="100" fill="#87ceeb" stroke="#333" stroke-width="2" rx="5"/>
  <text x="675" y="110" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Local</text>
  <text x="675" y="130" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Repository</text>
  <text x="675" y="155" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">(git commit)</text>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
  
  <line x1="200" y1="130" x2="320" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="260" y="120" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">git add</text>
  
  <line x1="475" y1="130" x2="595" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="535" y="120" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">git commit</text>
  
  <!-- Remote Repository -->
  <rect x="325" y="250" width="150" height="100" fill="#ff6b6b" stroke="#333" stroke-width="2" rx="5"/>
  <text x="400" y="280" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Remote</text>
  <text x="400" y="300" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Repository</text>
  <text x="400" y="325" font-family="Arial" font-size="11" fill="white" text-anchor="middle">(GitHub)</text>
  
  <!-- Push/Pull arrows -->
  <line x1="675" y1="180" x2="450" y2="250" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="580" y="210" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">git push</text>
  
  <line x1="400" y1="250" x2="550" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="440" y="210" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">git pull</text>
</svg>