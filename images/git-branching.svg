<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="300" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial" font-size="20" fill="#24292e" text-anchor="middle" font-weight="bold">Git Branching Strategy</text>
  
  <!-- Main branch line -->
  <line x1="50" y1="150" x2="750" y2="150" stroke="#333" stroke-width="4"/>
  
  <!-- Main branch commits -->
  <circle cx="100" cy="150" r="12" fill="#4CAF50" stroke="#333" stroke-width="2"/>
  <text x="100" y="180" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">main</text>
  
  <circle cx="250" cy="150" r="12" fill="#4CAF50" stroke="#333" stroke-width="2"/>
  <circle cx="550" cy="150" r="12" fill="#4CAF50" stroke="#333" stroke-width="2"/>
  <circle cx="700" cy="150" r="12" fill="#4CAF50" stroke="#333" stroke-width="2"/>
  
  <!-- Feature branch -->
  <path d="M 250 150 Q 300 120, 350 80 L 500 80 Q 520 90, 550 150" stroke="#2196F3" stroke-width="3" fill="none"/>
  
  <!-- Feature branch commits -->
  <circle cx="350" cy="80" r="10" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <circle cx="425" cy="80" r="10" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <circle cx="500" cy="80" r="10" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <text x="425" y="60" font-family="Arial" font-size="11" fill="#2196F3" text-anchor="middle" font-weight="bold">feature/new-feature</text>
  
  <!-- Bugfix branch -->
  <path d="M 100 150 Q 120 180, 150 220 L 200 220 Q 220 200, 250 150" stroke="#FF9800" stroke-width="3" fill="none"/>
  
  <!-- Bugfix commits -->
  <circle cx="150" cy="220" r="10" fill="#FF9800" stroke="#333" stroke-width="2"/>
  <circle cx="200" cy="220" r="10" fill="#FF9800" stroke="#333" stroke-width="2"/>
  <text x="175" y="250" font-family="Arial" font-size="11" fill="#FF9800" text-anchor="middle" font-weight="bold">bugfix/issue-123</text>
  
  <!-- Labels -->
  <text x="575" y="140" font-family="Arial" font-size="10" fill="#666" text-anchor="start">merge feature</text>
  <text x="270" y="140" font-family="Arial" font-size="10" fill="#666" text-anchor="start">merge bugfix</text>
</svg>